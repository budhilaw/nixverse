##############################################################################
# SOPS configuration
#
# Setup (one-time):
#   mkdir -p ~/.config/sops/age
#   nix shell nixpkgs#age -c age-keygen -o ~/.config/sops/age/keys.txt
#   Replace the placeholder below with the printed "public key: age1..."
#   Save the private key (AGE-SECRET-KEY-1...) to 1Password
#
# One age key is used across all machines — restore keys.txt from
# 1Password to ~/.config/sops/age/keys.txt on each new machine.
##############################################################################
keys:
  - &budhilaw age1nee0l03vzmqzg7s4k4u3pzjypwcd8nvsqzyhjge0h4s6pr6z897su3flls

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *budhilaw
